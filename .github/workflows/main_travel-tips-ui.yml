# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - travel-tips-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Zip build output
        run: |
          powershell Compress-Archive -Path dist\* -DestinationPath ui.zip

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: ui-app
          path: ui.zip

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ui-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_891333D3DA774AD08A6FEB1B1187146C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6BE09FF52FD6497B95EE3A276D55647D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_62F4F2BD54EC4A4B97D01974D87CB2B7 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'travel-tips-ui'
          slot-name: 'Production'
          package: ui.zip
