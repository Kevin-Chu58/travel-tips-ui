# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deployMore actions
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy UI to Azure Web App - travel-tips-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: List files in working directory
        run: dir

      - name: List build folder contents
        run: dir dist

      - name: Zip production build
        run: |
          powershell Compress-Archive -Path dist\* -DestinationPath ui.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-app
          path: ui.zip

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CCE300D96F7447D1848B68F9C42F566A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E74ED92FD4A64038A8D7EC437F199485 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F6ED49D8FDBF49F9AC0A249967F6318B }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'travel-tips-ui'
          slot-name: 'Production'
          package: ui.zip
          
