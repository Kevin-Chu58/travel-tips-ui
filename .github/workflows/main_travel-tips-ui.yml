# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy UI to Azure Web App - travel-tips-ui

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Zip production build
        run: |
          powershell Compress-Archive -Path build\* -DestinationPath ui.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-app
          path: ui.zip

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9FC3B45117294C639936687FD1CA4118 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F00BD62ED814C18941D3F1A180CFCF0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1CF1526EDE5C4AD491A355CB834B74B8 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'travel-tips-ui'
          slot-name: 'Production'
          package: ui.zip
