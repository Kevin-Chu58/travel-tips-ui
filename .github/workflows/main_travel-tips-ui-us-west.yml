name: Build and deploy Node.js app to Azure Web App - travel-tips-ui-us-west

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      # fix what's auto-fixable, don't fail the build
      # fail ONLY on critical vulnerabilities
      - name: npm install and build
        run: |
          npm install
          npm audit fix --force || true   
          npm audit --audit-level=critical 
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist # only upload the built output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_43CD283375A74BAC875252728C17352F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A10A82DDCEB543DA8476219A085C127E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C3DE0305677E49B8959067895250095C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "travel-tips-ui-us-west"
          slot-name: "Production"
          package: .
