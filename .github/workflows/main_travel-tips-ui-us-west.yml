name: Build and deploy Node.js app to Azure Web App - travel-tips-ui-us-west

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Zip build output
        run: |
          zip -r ui.zip dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ui-dist

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2C593CB3877742CB8E526A1097F5B0EF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D2B7431B90024DC4B1FD3BA7DA8AF14F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_59FB7B632D7746F286C35987464833D1 }}

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'travel-tips-ui-us-west'
          slot-name: 'Production'
          package: ui.zip
